<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passport Photo Cropper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="card hero">
      <div>
        <p class="eyebrow">DIY passport photo</p>
        <h1>Upload, frame, export</h1>
        <p>Generate a printable passport-photo crop with a white background card and guide box.</p>
      </div>
      <label class="upload">Upload photo<input id="file" type="file" accept="image/*" hidden /></label>
    </section>
    <section class="grid two-up">
      <article class="card stack">
        <h2>Adjust framing</h2>
        <label>Zoom <input id="zoom" type="range" min="1" max="3" step="0.05" value="1.4" /></label>
        <label>Horizontal <input id="offsetX" type="range" min="-150" max="150" value="0" /></label>
        <label>Vertical <input id="offsetY" type="range" min="-150" max="150" value="0" /></label>
        <button id="download">Download PNG</button>
      </article>
      <article class="card stack">
        <h2>Preview</h2>
        <canvas id="canvas" width="500" height="500"></canvas>
        <p class="muted">This MVP uses manual framing and a white background fill. It does not run true face detection.</p>
      </article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
